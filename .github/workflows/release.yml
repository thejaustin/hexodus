name: Build & Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        cache-read-only: ${{ github.ref != 'refs/heads/main' }}

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        packages: 'build-tools;35.0.0 platforms;android-36'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Run Detekt (Quality Check)
      run: ./gradlew detekt --continue || true # Don't fail build on lint for now, but report

    - name: Calculate Version
      run: |
        if [[ $GITHUB_REF == refs/tags/v* ]]; then
          TAG_NAME=${GITHUB_REF#refs/tags/}
          VERSION=${TAG_NAME#v}
          sed -i "s/version.name=.*/version.name=$VERSION/" version.properties
          echo "NEW_VERSION=$TAG_NAME" >> $GITHUB_ENV
          echo "IS_PRERELEASE=$( [[ $TAG_NAME == *"-"* ]] && echo true || echo false )" >> $GITHUB_ENV
        else
          VERSION=$(python3 scripts/version_manager.py alpha)
          echo "NEW_VERSION=$VERSION" >> $GITHUB_ENV
          echo "IS_PRERELEASE=true" >> $GITHUB_ENV
        fi

    - name: Build Debug APK
      run: ./gradlew assembleDebug --scan

    - name: Prepare Release Asset
      run: |
        mkdir -p release
        cp app/build/outputs/apk/debug/*.apk release/hexodus-${{ env.NEW_VERSION }}.apk

    - name: Upload GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ env.NEW_VERSION }}
        files: release/hexodus-${{ env.NEW_VERSION }}.apk
        prerelease: ${{ env.IS_PRERELEASE }}
        name: Hexodus ${{ env.NEW_VERSION }}
        generate_release_notes: true
        body: |
          ### Automated Build for ${{ env.NEW_VERSION }}
          - Latest changes synchronized with Shizuku+ Enhanced API
          - M3 Expressive UI/UX Refinements
          
          View the full changelog below for a list of all merged PRs and commits.
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload to Firebase App Distribution
      if: env.IS_PRERELEASE == 'true'
      uses: wzieba/Firebase-Distribution-Github-Action@v1
      continue-on-error: true
      with:
        appId: ${{ secrets.FIREBASE_APP_ID }}
        serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        groups: testers
        file: release/hexodus-${{ env.NEW_VERSION }}.apk
        releaseNotes: ${{ github.event.head_commit.message }}

    - name: Notify Sentry of release
      if: startsWith(github.ref, 'refs/tags/') && env.IS_PRERELEASE == 'false'
      env:
        SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        SENTRY_ORG: af-developments
        SENTRY_PROJECT: hexodus
      run: |
        curl -sL https://sentry.io/get-cli/ | bash
        sentry-cli releases new "hexodus@${{ env.NEW_VERSION }}"
        sentry-cli releases set-commits "hexodus@${{ env.NEW_VERSION }}" --auto
        sentry-cli releases finalize "hexodus@${{ env.NEW_VERSION }}"
        sentry-cli releases deploys "hexodus@${{ env.NEW_VERSION }}" new -e production
